name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Match local dev (node 24 / npm 11) — npm 11 lockfiles omit
          # platform-skipped optional-dep entries (@emnapi/* via sharp)
          # that npm 10 (node 22) treats as out-of-sync and fails ci on.
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test
