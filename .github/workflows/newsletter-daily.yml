# Daily newsletter engine — builds the brief and SENDS it via Klaviyo
# each weekday morning at 09:00 UTC.
#
# 09:00 UTC = 5am ET (4am during DST — accepted; Geneva opens 10am CEST).
# Spec: specs/current/newsletter-engine.md
#
# TEST PHASE: the scheduled run uses --send, and the audience is whatever
# NEWSLETTER_KLAVIYO_LIST_ID points to. Keep that a YOU-ONLY test list
# until the voice/design are signed off — only then point it at the real
# opt-in subscriber list.
name: Newsletter Daily
on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (HTML only) | draft (Klaviyo draft, no send) | send"
        type: choice
        default: draft
        options: [dry-run, draft, send]

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # node 24 to match local dev + CI — see ci.yml note on npm 10
          # rejecting npm 11 lockfiles.
          node-version: 24
          cache: npm
      # npm install (not npm ci): the lock, generated on macOS arm64, omits
      # some Linux-only optional deps (Tailwind oxide's @emnapi WASM
      # fallback), which makes `npm ci` fail its strict lock check on the
      # Linux runner. `npm install` reconciles per-platform and proceeds.
      - run: npm install --no-audit --no-fund
      # Scheduled runs (no inputs.mode) SEND; manual dispatch picks the mode.
      - run: npx tsx newsletter/main.ts --${{ inputs.mode || 'send' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Write-scoped key (Campaigns + Templates) for draft/send; falls
          # back to KLAVIYO_API_KEY (read-only analytics key) if unset.
          NEWSLETTER_KLAVIYO_API_KEY: ${{ secrets.NEWSLETTER_KLAVIYO_API_KEY }}
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
          NEWSLETTER_KLAVIYO_LIST_ID: ${{ secrets.NEWSLETTER_KLAVIYO_LIST_ID }}
          # TEST-PHASE ONLY: distinct campaign-name suffix so scheduled runs
          # don't collide with the same-date campaigns created during manual
          # testing (Klaviyo won't reuse a Sent campaign name). REMOVE this
          # line once the test dates pass / before real production sends.
          NEWSLETTER_SLUG_SUFFIX: "-auto"
          # Production Neon branch — newsletter tables live in the shared schema
          DATABASE_URL: ${{ secrets.NEWSLETTER_DATABASE_URL }}
          # BrightData residential proxy — WatchPro + WatchTime fetch through
          # it (Cloudflare). Without these they fail soft (drop from the brief).
          BRIGHTDATA_USERNAME: ${{ secrets.BRIGHTDATA_USERNAME }}
          BRIGHTDATA_PASSWORD: ${{ secrets.BRIGHTDATA_PASSWORD }}
          # Vercel Blob — re-hosts story images to our CDN (no hotlinking).
          # Without it images hotlink from source sites (fail-soft).
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      - name: Upload dry-run HTML
        if: inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-html
          path: /tmp/micro-adjust-*.html
          if-no-files-found: warn
