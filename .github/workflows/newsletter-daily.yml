# Daily newsletter engine — drafts the brief in Klaviyo each weekday
# morning. SENDING IS MANUAL in Klaviyo's UI while the voice settles
# (specs/strategy/newsletter.md); flip to a send-job step later.
#
# 09:00 UTC = 5am ET (4am during DST — accepted; Geneva opens 10am CEST).
# Spec: specs/current/newsletter-engine.md
#
# SCHEDULE DISABLED until secrets are configured + a few drafts approved.
# Re-enable by uncommenting the `schedule:` block below. Until then the
# workflow only runs on manual dispatch (Actions tab → Run workflow).
name: Newsletter Daily
on:
  # schedule:
  #   - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (HTML artifact only) or draft (DB + Klaviyo draft)"
        type: choice
        default: draft
        options: [dry-run, draft]

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # node 24 to match local dev + CI — see ci.yml note on npm 10
          # rejecting npm 11 lockfiles.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx tsx newsletter/main.ts --${{ inputs.mode || 'draft' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KLAVIYO_API_KEY: ${{ secrets.KLAVIYO_API_KEY }}
          NEWSLETTER_KLAVIYO_LIST_ID: ${{ secrets.NEWSLETTER_KLAVIYO_LIST_ID }}
          # Production Neon branch — newsletter tables live in the shared schema
          DATABASE_URL: ${{ secrets.NEWSLETTER_DATABASE_URL }}
          # BrightData residential proxy — WatchPro + WatchTime fetch through
          # it (Cloudflare). Without these they fail soft (drop from the brief).
          BRIGHTDATA_USERNAME: ${{ secrets.BRIGHTDATA_USERNAME }}
          BRIGHTDATA_PASSWORD: ${{ secrets.BRIGHTDATA_PASSWORD }}
          # Vercel Blob — re-hosts story images to our CDN (no hotlinking).
          # Without it images hotlink from source sites (fail-soft).
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      - name: Upload dry-run HTML
        if: inputs.mode == 'dry-run'
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-html
          path: /tmp/micro-adjust-*.html
          if-no-files-found: warn
