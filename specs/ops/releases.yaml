- date: "2026-06-04"
  title: "Dashboard reconciles with Shopify: store-tz dates + refund-aware Total sales"
  priority: 1
  layer: 1
  notes: |
    Two fixes to make the admin dashboard agree with Shopify. (1) Timezone:
    "Today" and all date filters + daily chart buckets now compute in the store
    timezone (America/Los_Angeles, src/lib/timezone.ts) instead of UTC — fixes
    the "Today shows $0" evening-Pacific rollover. (2) Total sales: the headline
    metric is now SUM(total_price - total_refunded) over non-cancelled orders
    (includes pending/wholesale, subtracts returns), replacing the paid-only
    "Revenue". New order columns (migration 0049): total_tax, total_discounts,
    total_shipping, total_refunded, cancelled_at; sync maps them; full-history
    backfill run on prod. total_refunded = returned-item value (refund line
    items + adjustments), not cash. 30-day window: $14,015 -> ~$25,364.
    Component columns (discounts/shipping/tax) reconcile with Shopify. Exact
    parity with this sandbox's Analytics report is blocked by source-data
    inconsistency (its Orders API lacks the returns the report claims); on a
    real store the same code reconciles.
  artifacts:
    - specs/work-plans/completed/shopify-total-sales-parity.md
    - src/lib/timezone.ts
    - src/lib/date-range.ts
    - src/components/layout/date-range-picker.tsx
    - src/lib/schema.ts
    - drizzle/migrations/0049_noisy_lord_tyger.sql
    - src/lib/shopify/sync.ts
    - src/types/shopify.ts
    - src/app/(admin)/dashboard/page.tsx
    - scripts/backfill-order-money.ts
    - specs/current/schema.md

- date: "2026-06-04"
  title: "Dashboard: D2C / Trade Show / B2B sales breakdown"
  priority: 1
  layer: 1
  notes: |
    New "Sales by Segment" card on the dashboard: Total sales, Orders, Avg
    order, and % of sales for D2C (Online) / Trade Show / B2B (Wholesale), over
    the selected date range. Segmentation signal is order.source_name (no B2B
    customer tags exist): B2B = shopify_draft_order; Trade Show = pos; D2C = web
    + everything else. Uses the same refund-aware Total sales definition as
    the headline. Also fixes a same-day GROUP BY 500 regression
    (commit 492f846): the store-tz literal in date_trunc was a bound param,
    which Drizzle numbered differently per reuse across SELECT/GROUP BY/ORDER BY
    — inlined as a SQL literal.
  artifacts:
    - src/app/(admin)/dashboard/page.tsx
    - src/app/(admin)/attribution/page.tsx
    - src/app/(admin)/funnel/page.tsx
    - src/app/api/admin/funnel/route.ts

- date: "2026-06-04"
  title: "Dashboard: Avg Lifetime Value (LTV) by D2C / Trade Show / B2B"
  priority: 1
  layer: 1
  notes: |
    New all-time "Avg Lifetime Value (LTV)" card: Avg LTV, avg orders/customer,
    repeat rate, and customer count per segment. Method = historic CLV
    (net revenue per customer to date) — the assumption-free industry standard
    (= Shopify's "lifetime value"). Predictive CLV (AOV × frequency × lifespan)
    was intentionally NOT used: the store is only ~6 months old (first order
    Nov 25 2025), so a churn/lifespan estimate would be fabricated. Card is
    all-time and ignores the date filter. Customer segmentation by priority:
    B2B (ever placed a wholesale draft order) > Trade Show (ever bought via POS)
    > D2C (purely online). Current values: D2C ~$72 (465 customers, 7% repeat),
    Trade Show ~$72 (39, 5%), B2B ~$521 (64, 56%). Follow-up when there's
    ~12mo+ of history: add a predictive CLV with a data-derived lifespan, or
    switch B2B detection to a Shopify customer tag.
  artifacts:
    - src/app/(admin)/dashboard/page.tsx

- date: "2026-06-05"
  title: "Production: per-sub-PO ETA (master ETA locked on multi-supplier, like price)"
  priority: 7
  notes: |
    Each sub-PO now has its own ETA (expected_delivery_date), mirroring how each
    supplier sets their own price. The master PO's ETA is locked on the edit form
    when split across suppliers (disabled, "set per sub-PO" — same pattern as the
    per-line unit-cost lock) and the master display shows the rolled-up ETA =
    latest sub-PO (rollupEta). No schema change: ETA reuses the existing
    expected_delivery_date column on each sub-PO row, and is preserved per-supplier
    across sub-PO regeneration in syncMasterSubPos (like line costs survive). New
    admin-only, sub-PO-only route PUT /api/production/po/[id]/eta + setSubPoEta();
    ETA input added to SubPoCovers; each sub-PO's ETA shown in the master's
    sub-PO list. 557 tests pass (rollupEta unit-tested).
  artifacts:
    - src/lib/production/sub-po.ts
    - src/lib/production/service.ts
    - src/app/api/production/po/[id]/eta/route.ts
    - src/app/(admin)/modules/production/po/[id]/sub-po-covers.tsx
    - src/app/(admin)/modules/production/po/[id]/page.tsx
    - src/app/(admin)/modules/production/po/new/po-form.tsx
