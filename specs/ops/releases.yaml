- date: "2026-06-04"
  title: "Dashboard: Avg Lifetime Value (LTV) by D2C / Trade Show / B2B"
  priority: 1
  layer: 1
  notes: |
    New all-time "Avg Lifetime Value (LTV)" card: Avg LTV, avg orders/customer,
    repeat rate, and customer count per segment. Method = historic CLV
    (net revenue per customer to date) — the assumption-free industry standard
    (= Shopify's "lifetime value"). Predictive CLV (AOV × frequency × lifespan)
    was intentionally NOT used: the store is only ~6 months old (first order
    Nov 25 2025), so a churn/lifespan estimate would be fabricated. Card is
    all-time and ignores the date filter. Customer segmentation by priority:
    B2B (ever placed a wholesale draft order) > Trade Show (ever bought via POS)
    > D2C (purely online). Current values: D2C ~$72 (465 customers, 7% repeat),
    Trade Show ~$72 (39, 5%), B2B ~$521 (64, 56%). Follow-up when there's
    ~12mo+ of history: add a predictive CLV with a data-derived lifespan, or
    switch B2B detection to a Shopify customer tag.
  artifacts:
    - src/app/(admin)/dashboard/page.tsx

- date: "2026-06-05"
  title: "Production: per-sub-PO ETA (master ETA locked on multi-supplier, like price)"
  priority: 7
  notes: |
    Each sub-PO now has its own ETA (expected_delivery_date), mirroring how each
    supplier sets their own price. The master PO's ETA is locked on the edit form
    when split across suppliers (disabled, "set per sub-PO" — same pattern as the
    per-line unit-cost lock) and the master display shows the rolled-up ETA =
    latest sub-PO (rollupEta). No schema change: ETA reuses the existing
    expected_delivery_date column on each sub-PO row, and is preserved per-supplier
    across sub-PO regeneration in syncMasterSubPos (like line costs survive). New
    admin-only, sub-PO-only route PUT /api/production/po/[id]/eta + setSubPoEta();
    ETA input added to SubPoCovers; each sub-PO's ETA shown in the master's
    sub-PO list. 557 tests pass (rollupEta unit-tested).
  artifacts:
    - src/lib/production/sub-po.ts
    - src/lib/production/service.ts
    - src/app/api/production/po/[id]/eta/route.ts
    - src/app/(admin)/modules/production/po/[id]/sub-po-covers.tsx
    - src/app/(admin)/modules/production/po/[id]/page.tsx
    - src/app/(admin)/modules/production/po/new/po-form.tsx

- date: "2026-06-08"
  title: "Primary host migrated: admin.fitwellbuckle.co → portal.fitwellbuckle.co"
  priority: 1
  layer: 1
  notes: |
    portal.fitwellbuckle.co is now the production host. admin. 307-redirects to
    portal. for legacy bookmarks + existing Shopify webhook subscriptions
    (Shopify follows the redirect transparently while the per-topic
    re-registration catches up). AUTH_URL flipped, Google OAuth client
    authorizes the portal redirect URI, Shopify app deployed via CLI
    (fitwell-admin-8), all 11 webhook topics re-pointed at the new URL.
    Resend email keeps working (records sit on send.portal.… and
    resend._domainkey.portal.… — separate from the bare portal. A record).

    Key discoveries documented in AGENTS.md §12: (1) DNS for fitwellbuckle.co
    is administered through Shopify Admin → DNS Settings, NOT Google Cloud
    Console (the googledomains.com nameservers are just Shopify's underlying
    infra), and (2) the Shopify store handle is fitwell-buckles (with hyphen)
    not fitwellbuckle — wrong handle returns a generic "There's a problem
    loading this page" error rather than 404.
  artifacts:
    - specs/work-plans/completed/portal-domain-cutover.md
    - AGENTS.md
    - shopify.app.toml
    - scripts/shopify-cli.ts

